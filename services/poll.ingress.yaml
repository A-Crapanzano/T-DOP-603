apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: poll
  namespace: default
spec:
  ingressClassName: traefik
  rules:
    - host: poll.dop.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: poll
                port: { number: 80 }