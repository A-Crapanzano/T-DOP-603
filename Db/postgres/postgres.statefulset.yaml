apiVersion: apps/v1
kind: StatefulSet                    
metadata:
  name: postgres
  namespace: default
  labels:
    app: postgres
spec:
  serviceName: postgres-service      
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          args: ["postgres", "-c", "password_encryption=md5"]
          ports:
            - containerPort: 5432
          envFrom:
            - configMapRef:
                name: postgres-configmap
            - secretRef:
                name: postgres-secret
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:              
    - metadata:
        name: postgres-storage       
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: manual 
        resources:
          requests:
            storage: 1Gi